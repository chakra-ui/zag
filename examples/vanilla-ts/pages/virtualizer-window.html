<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Window Virtualizer · Vanilla</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 20px;
        max-width: 960px;
        margin: 0;
      }
      #root {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        margin-top: 16px;
        position: relative;
      }
      #inner {
        position: relative;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Window Virtualizer</h1>
    <p style="color: #64748b">Uses the page scroll container instead of an explicit scrolling element.</p>

    <div id="root">
      <div id="inner"></div>
    </div>

    <script type="module" src="../src/virtualizer-window.ts"></script>
  </body>
</html>
